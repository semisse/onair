name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build native binary
        run: npm run build:native

      - name: Build icons
        run: npm run build:icons

      - name: Build DMG
        run: npx electron-builder --mac --publish never

      - name: Smoke test — verify binary is outside asar
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          hdiutil attach "$DMG" -mountpoint /tmp/onair-dmg -quiet
          test -x "/tmp/onair-dmg/On Air.app/Contents/Resources/app.asar.unpacked/native/check-mic"
          echo "✓ check-mic is present and executable"
          hdiutil detach /tmp/onair-dmg -quiet

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
